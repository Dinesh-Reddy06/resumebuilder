<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumeForge – HR Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f4f6fb;
        }

        .skill-tag {
            display: inline-block;
            background: #e9ecef;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 11px;
            margin: 2px 2px 2px 0;
            color: #495057;
        }

        .skill-tag.highlight {
            background: #fff3cd;
            color: #856404;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand fw-bold" href="index.html" style="font-family:'Playfair Display',serif">⚒ ResumeForge</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-secondary small">Logged in as <strong class="text-white" id="navUserName"></strong> ·
                <span id="navCompany"></span></span>
            <button class="btn btn-outline-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </nav>

    <!-- Hero Welcome Section -->
    <div class="bg-dark text-white py-5 px-4 mb-4">
        <div class="container">
            <p class="text-warning small text-uppercase fw-semibold mb-1">HR Dashboard</p>
            <h2 style="font-family:'Playfair Display',serif">Welcome back, <span id="welcomeName"></span> 👋</h2>
            <p class="text-secondary mb-0">Company: <span class="text-white fw-semibold" id="heroCompany"></span></p>
        </div>
    </div>

    <!-- Applicants Panel -->
    <div class="container mb-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white d-flex flex-wrap align-items-center justify-content-between gap-2 py-3">
                <h6 class="mb-0 fw-semibold">📋 All Applicants</h6>
                <div class="d-flex gap-2 flex-wrap">
                    <input type="text" class="form-control form-control-sm" id="skillSearch"
                        placeholder="Search by skill…" style="width:200px"
                        onkeydown="if(event.key==='Enter')doSearch()" />
                    <button class="btn btn-dark btn-sm" onclick="doSearch()">Search</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="clearSearch()">Clear</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle small">
                    <thead class="table-light text-uppercase text-muted" style="font-size:11px;letter-spacing:1px">
                        <tr>
                            <th>#</th>
                            <th>Applicant</th>
                            <th>Contact</th>
                            <th>Skills</th>
                            <th>Experience</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="applicantsTable">
                        <tr>
                            <td colspan="6" class="text-center text-muted py-5">📭 No applicants yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalName">Applicant Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body small" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js">
    </script>
</body>

</html>
