<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumeForge – HR Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at 30% 50%, rgba(238, 174, 202, 0.8), rgba(148, 187, 233, 0.8));
            min-height: 100vh;
        }

        .brand-link {
            color: #111110;
            font-weight: 700;
            text-decoration: none;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #6c757d;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            cursor: pointer;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">
    <div style="width:100%;max-width:440px;padding:16px">
        <div class="text-center mb-3">
            <a href="index.html" class="brand-link fs-4">⚒ ResumeForge</a>
            <p class="text-muted small mt-1">HR Portal Access</p>
        </div>
        <div class="card shadow border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-dark text-white py-3 px-4">
                <h5 class="mb-0" style="font-family:'Playfair Display',serif">HR Dashboard</h5>
                <p class="text-secondary small mb-0">Sign in or create a company account</p>
            </div>
            <div class="card-body px-4 py-3">
                <div class="d-flex border-bottom mb-3">
                    <button class="tab-btn active" id="signinTab" onclick="showTab('signin')">Sign In</button>
                    <button class="tab-btn" id="registerTab" onclick="showTab('register')">Register</button>
                </div>
                <div id="alertMsg" class="alert d-none small py-2"></div>
                <!-- Sign In -->
                <div id="signinForm">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Username</label>
                        <input type="text" class="form-control form-control-sm" id="siUsername"
                            placeholder="Enter username" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Password</label>
                        <input type="password" class="form-control form-control-sm" id="siPassword"
                            placeholder="Enter password" />
                    </div>
                    <button class="btn btn-dark w-100" onclick="doSignIn()">Sign In →</button>
                </div>
                <!-- Register -->
                <div id="registerForm" style="display:none">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Full Name</label>
                        <input type="text" class="form-control form-control-sm" id="regName"
                            placeholder="Your full name" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Username</label>
                        <input type="text" class="form-control form-control-sm" id="regUsername"
                            placeholder="Choose a username" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Password</label>
                        <input type="password" class="form-control form-control-sm" id="regPassword"
                            placeholder="Create password" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Company Name</label>
                        <input type="text" class="form-control form-control-sm" id="regCompany"
                            placeholder="Your company name" />
                    </div>
                    <button class="btn btn-dark w-100" onclick="doRegister()">Create Account →</button>
                </div>
            </div>
        </div>
        <p class="text-center text-muted small mt-3">
            <a href="index.html" class="text-secondary">← Back to Home</a>
        </p>
    </div>
    <script src="script.js"></script>
</body>

</html>
